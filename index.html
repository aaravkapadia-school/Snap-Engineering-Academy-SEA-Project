<!doctype html>
<html>
  <head>
    <title>UFC Fighters | Home</title>
    <meta name="description" content="A Catalog of the top 5 UFC fighters in each division" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">UFC Fighters</h1>
    </header>
    <div class="controls">
      <select id="sort-select" onchange="filter()">
        <option value="default">Division (Default)</option>
        <option value="wins">Most Wins</option>
        <option value="losses">Most Losses</option>
        <option value="knockouts">Most KOs</option>
        <option value="submissions">Most Submissions</option>
        <option value="ranking">Ranking</option>
      </select>
      <input id="search-input" type="text" placeholder="Search fighters..." oninput="searchFighters()" />
      <button onclick="clearSearch()">Clear</button>
    </div>
    <div class="add-fighter-form">
      <h3>Add a Fighter</h3>
      <form id="add-fighter-form">
        <input id="input-name" type="text" placeholder="Name" />
        <input id="input-nickname" type="text" placeholder="Nickname (or N/A)" />
        <select id="input-division">
          <option>Flyweight</option>
          <option>Bantamweight</option>
          <option>Featherweight</option>
          <option>Lightweight</option>
          <option>Welterweight</option>
          <option>Middleweight</option>
          <option>Light Heavyweight</option>
          <option>Heavyweight</option>
        </select>
        <input id="input-wins" type="number" placeholder="Wins" />
        <input id="input-losses" type="number" placeholder="Losses" />
        <input id="input-draws" type="number" placeholder="Draws" />
        <input id="input-knockouts" type="number" placeholder="KOs" />
        <input id="input-submissions" type="number" placeholder="Submissions"/>
        <input id="input-ranking" type="text" placeholder="Ranking (1-15 or C)" />
        <input id="input-poster" type="text" placeholder="Image URL" />
        <button type="button" onclick="addFighter()">Add Fighter</button>
      </form>
    </div>
    <div id="card-container"></div>
    <div class="card" style="display: none">
      <div class="card-content">
        <img src="" alt="Fighter Poster" />
        <h2>Fighter</h2>
        <p class="nickname"></p>
        <p class="record"></p>
        <p class="ranking"></p>
        <p class="kos"></p>
        <p class="subs"></p>
      </div>
    </div>
  <script type="text/javascript" src="scripts.js"></script>
  </body>
</html>
